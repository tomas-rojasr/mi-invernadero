# Configuración exclusiva para el entorno de pruebas.
# Usa H2 en memoria para no depender de PostgreSQL en CI/CD.
spring:
  datasource:
    url: jdbc:h2:mem:invernadero_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  sample-data:
    enabled: false   # Sin datos demo en pruebas — cada test parte de BD vacía
  security:
    oauth2-enabled: false
  taiga:
    personal-access-token: test-token
