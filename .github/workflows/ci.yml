# Nombre del pipeline que aparece en la pestaña Actions de GitHub
name: CI/CD

# Define cuándo se activa este pipeline automáticamente
on:
  push:
    branches: [ main ]         # Se ejecuta al hacer push a la rama main
  pull_request:
    branches: [ main ]         # También se ejecuta al abrir un Pull Request hacia main

# Los jobs se ejecutan en paralelo por defecto (test-backend y build-frontend corren al mismo tiempo)
jobs:

  # ── JOB 1: Pruebas del backend Java ────────────────────────────────────────
  test-backend:
    name: Pruebas Backend
    runs-on: ubuntu-latest     # Usa una máquina virtual Ubuntu limpia en GitHub

    steps:
      - name: Checkout código
        uses: actions/checkout@v4   # Descarga el código del repositorio en la VM

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'        # Versión de Java requerida por el proyecto
          distribution: 'temurin'   # Distribución OpenJDK de Eclipse Adoptium
          cache: maven              # Cachea las dependencias Maven para acelerar futuros runs

      - name: Ejecutar pruebas unitarias
        working-directory: invernadero-back   # Corre el comando dentro de la carpeta del backend
        run: mvn test --batch-mode            # Ejecuta todos los tests JUnit/Mockito/MockMvc
        env:
          TAIGA_TOKEN: ${{ secrets.TAIGA_TOKEN }}  # Inyecta el token de Taiga desde GitHub Secrets

  # ── JOB 2: Compilación del frontend React ──────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'         # Versión LTS de Node.js
          cache: 'npm'               # Cachea node_modules para acelerar futuros runs
          cache-dependency-path: invernadero-front/package-lock.json

      - name: Instalar dependencias
        working-directory: invernadero-front
        run: npm ci                  # Instala las dependencias exactas del package-lock.json

      - name: Compilar frontend
        working-directory: invernadero-front
        run: npm run build           # Compila TypeScript + React con Vite → genera carpeta dist/

  # ── JOB 3: Despliegue automático en Render ─────────────────────────────────
  deploy:
    name: Desplegar en Render
    runs-on: ubuntu-latest
    needs: [ test-backend, build-frontend ]  # Solo corre si los dos jobs anteriores pasaron
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'  # Solo en push a main, no en PRs

    steps:
      - name: Disparar redespliegue en Render
        run: |
          # Llama al Deploy Hook de Render: una URL secreta que activa el redespliegue
          # Render descarga el código más reciente de GitHub y reinicia el servidor Java
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render respondió con HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Error al disparar el redespliegue"
            exit 1   # Falla el pipeline si Render no respondió correctamente
          fi
          echo "Redespliegue iniciado exitosamente"
