name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Pruebas Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar pruebas unitarias
        working-directory: invernadero-back
        run: mvn test --batch-mode
        env:
          TAIGA_TOKEN: ${{ secrets.TAIGA_TOKEN }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: invernadero-front/package-lock.json

      - name: Instalar dependencias
        working-directory: invernadero-front
        run: npm ci

      - name: Compilar frontend
        working-directory: invernadero-front
        run: npm run build

  deploy:
    name: Desplegar en Render
    runs-on: ubuntu-latest
    needs: [ test-backend, build-frontend ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Disparar redespliegue en Render
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render respondió con HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Error al disparar el redespliegue"
            exit 1
          fi
          echo "Redespliegue iniciado exitosamente"
